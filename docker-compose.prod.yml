version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: journal-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-journal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-journal}
      POSTGRES_DB: ${POSTGRES_DB:-journal_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-journal} -d ${POSTGRES_DB:-journal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: journal-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Elysia API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: journal-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-journal}:${POSTGRES_PASSWORD:-journal}@postgres:5432/${POSTGRES_DB:-journal_db}
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml-service:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: journal-web
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
